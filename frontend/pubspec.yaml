name: horeca_app
description: A fast SaaS app for HoReCa
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: 2.4.9
  go_router: 13.2.5
  shared_preferences: 2.2.2
  pdf: 3.10.7
  share_plus: 7.2.2
  dio: ^5.9.2
  file_picker: ^8.0.0
  excel: ^4.0.0
  path_provider: ^2.1.1
  universal_html: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/fonts/NotoSans-Regular.ttf
