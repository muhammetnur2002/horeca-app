workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: linux
    environment:
      flutter: stable
    scripts:
      - name: Clean and get dependencies
        script: |
          cd frontend
          flutter clean
          rm -rf android/.gradle
          rm -rf build
          flutter pub get
      - name: Build APK
        script: |
          cd frontend
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - frontend/build/app/outputs/flutter-apk/app-release.apk

  ios-release:
    name: iOS Release
    max_build_duration: 90
    instance_type: mac_mini_m1   # Codemagic предоставляет Mac-инстансы
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Clean and get dependencies
        script: |
          cd frontend
          flutter clean
          rm -rf ios/Pods
          rm -rf ios/Podfile.lock
          flutter pub get
      - name: Build iOS
        script: |
          cd frontend
          flutter build ios --release --no-codesign   # для теста можно без подписи
    artifacts:
      - frontend/build/ios/iphoneos/Runner.app