workflows:
  android-release:
    name: Android Release
    max_build_duration: 60
    instance_type: linux
    environment:
      flutter: stable
    scripts:
      - name: Clean and get dependencies
        script: |
          cd frontend
          flutter clean
          rm -rf android/.gradle
          rm -rf build
          flutter pub get
      - name: Build APK
        script: |
          cd frontend
          flutter build apk --release --no-tree-shake-icons
    artifacts:
      - frontend/build/app/outputs/flutter-apk/app-release.apk

  ios-release:
    name: iOS Release
    max_build_duration: 90
    instance_type: mac_mini_m1   # потребуется платный план Codemagic для macOS-инстансов
    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
    cache:
      cache_paths:
        - $HOME/Library/Caches/CocoaPods
    scripts:
      - name: Setup CocoaPods and dependencies
        script: |
          cd frontend
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock
          flutter pub get
      - name: Build iOS with signing
        script: |
          cd frontend
          flutter build ipa --release \
            --export-method=ad-hoc \
            --build-number=$(date +%s) \
            --no-tree-shake-icons
    artifacts:
      - frontend/build/ios/ipa/*.ipa