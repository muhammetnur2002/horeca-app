name: horeca_app
description: A fast SaaS app for HoReCa
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: 2.4.9
  go_router: 13.2.5
  shared_preferences: 2.2.2
  pdf: 3.10.7
  printing: ^5.12.0
  share_plus: ^10.0.0
  dio: 4.0.6
  path_provider: ^2.1.1
  universal_html: ^2.3.0

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_test:
    sdk: flutter
  

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/fonts/NotoSans-Regular.ttf
    - assets/fonts/NotoSans-Bold.ttf

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D1128"
  adaptive_icon_foreground: "assets/icon/icon_fg.png"